apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.appName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "swim-ed254-consumer.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.appName }}-leader-election
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "swim-ed254-consumer.labels" . | nindent 4 }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.appName }}-leader-election
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "swim-ed254-consumer.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Values.appName }}-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ .Values.appName }}
    namespace: {{ .Values.namespace }}
