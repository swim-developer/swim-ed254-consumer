apiVersion: v1
kind: ConfigMap
metadata:
  name: swim-ed254-consumer-config
  namespace: swim-demo
  labels:
    app: swim-ed254-consumer
    component: configuration
    app.kubernetes.io/part-of: swim-ed254
data:
  MONGODB_DATABASE: "swim_ed254"
  ED254_SUBSCRIPTIONS: '[]'
  SWIM_PROVIDERS: '[{"providerId":"default","subscriptionManager":{"url":"https://swim-ed254-provider.swim-demo.svc.cluster.local:8443","tls":{"trustStorePath":"/secrets/truststore.p12","trustStorePassword":"changeme","keyStorePath":"/secrets/client-keystore.p12","keyStorePassword":"changeme"},"resilience":{"connectTimeoutMs":30000,"readTimeoutMs":30000,"retryMaxAttempts":3,"retryDelayMs":1000}},"amqpBroker":{"host":"mockserver-artemis-hdls-svc.swim-demo.svc.cluster.local","port":5671,"sslEnabled":true,"username":"admin","password":"admin","tls":{"trustStorePath":"/secrets/truststore.p12","trustStorePassword":"changeme","keyStorePath":"/secrets/client-keystore.p12","keyStorePassword":"changeme"}}}]'
  SWIM_VALIDATION_ENABLED: "true"
  KAFKA_BOOTSTRAP_SERVERS: "kafka-kafka-bootstrap.swim-demo.svc.cluster.local:9092"
  OTEL_ENABLED: "true"
  OTEL_ENDPOINT: "http://tempo-tempo-distributor.central-observability.svc.cluster.local:4318/v1/traces"
  OTEL_HEADERS: ""
  PROMETHEUS_ENABLED: "true"
