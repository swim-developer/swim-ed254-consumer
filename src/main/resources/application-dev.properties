# =============================================================================
# SWIM ED-254 Consumer - Development Profile
# =============================================================================
# Uses swim-ed254-consumer-validator (port 8085) as Subscription Manager
# and ed254-consumer-validator-artemis (port 5676) as AMQP broker
# DevServices are DISABLED to prevent Testcontainers from starting
# =============================================================================

# =============================================================================
# MongoDB (ed254-consumer-mongodb on port 27018)
# =============================================================================
quarkus.mongodb.connection-string=${MONGODB_URI:mongodb://localhost:27018}

# =============================================================================
# ED-254 Subscriptions (Hard-coded for local testing)
# =============================================================================
ed254.subscriptions=[{"provider":"validator","destinationAerodrome":[{"aerodromeDesignator":"LPPT"}],"supplementaryData":{"delay":true,"landingSequencePosition":true,"amanStrategy":false,"departureAerodrome":false,"proposedProcedure":false},"description":"Arrival sequences at Lisbon"},{"provider":"validator","destinationAerodrome":[{"aerodromeDesignator":"LEMD"}],"supplementaryData":{"delay":true,"landingSequencePosition":true,"amanStrategy":false,"departureAerodrome":false,"proposedProcedure":false},"description":"Arrival sequences at Madrid"}]

# =============================================================================
# SWIM Providers (Dev - ed254-consumer-validator-artemis AMQPS + mTLS)
# SM: http://localhost:8085 (swim-ed254-consumer-validator)
# AMQP: localhost:5675 -> container 5671. Certs: ./certs/generate.sh -> certs/ *.jks
# =============================================================================
swim.providers=[{"providerId":"validator","subscriptionManager":{"url":"http://localhost:8085","tls":null,"resilience":{"connectTimeoutMs":5000,"readTimeoutMs":5000,"retryMaxAttempts":3,"retryDelayMs":1000}},"amqpBroker":{"host":"localhost","port":5671,"sslEnabled":true,"username":"admin","password":"admin","tls":{"trustStorePath":"certs/truststore.jks","trustStorePassword":"changeit","keyStorePath":"certs/keystore.jks","keyStorePassword":"changeit"}}}]

# =============================================================================
# Subscription Renewal (Faster intervals for dev)
# =============================================================================
swim.subscription.renewal.check-interval=2m
swim.subscription.renewal.threshold=30m

# =============================================================================
# Validation
# =============================================================================

# =============================================================================
# DevServices - DISABLED (use compose.yml instead)
# =============================================================================
quarkus.devservices.enabled=false

# =============================================================================
# Kafka
# =============================================================================
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# =============================================================================
# Per-Subscription Heartbeat Monitor (faster check interval for dev)
# =============================================================================
swim.heartbeat.monitor.check-interval=10s

# =============================================================================
# OpenTelemetry - DISABLED in dev (no collector running)
# =============================================================================
quarkus.otel.enabled=false
quarkus.otel.sdk.disabled=true

# =============================================================================
# TLS
# =============================================================================
swim.tls.reload-period=off

# =============================================================================
# Logging
# =============================================================================
quarkus.log.level=INFO
quarkus.log.file.enabled=true
quarkus.log.file.path=target/app.log
