# =============================================================================
# SWIM ED-254 Consumer - Common Configuration (All Profiles)
# =============================================================================
# Profile-specific configs: application-{dev,test,prod}.properties
# =============================================================================

quarkus.application.name=swim-ed254-consumer
swim.service.name=ed254
swim.subscriptions=${ed254.subscriptions:[]}
swim.subscriptions.command-type=com.github.swim_developer.ed254.consumer.domain.model.DesiredSubscription

# =============================================================================
# MongoDB Configuration
# Dev Services starts a Testcontainer automatically when connection-string
# is absent (test/dev profiles). For prod, set MONGODB_URI env var.
# =============================================================================
quarkus.mongodb.database=${MONGODB_DATABASE:swim_ed254}
quarkus.mongodb.max-pool-size=${MONGODB_MAX_POOL_SIZE:150}
quarkus.mongodb.min-pool-size=${MONGODB_MIN_POOL_SIZE:20}
quarkus.mongodb.max-connection-idle-time=60s
quarkus.mongodb.connect-timeout=10s
quarkus.mongodb.read-timeout=60s
quarkus.mongodb.server-selection-timeout=10000
quarkus.mongodb.health.enabled=false

# =============================================================================
# SWIM Providers (Multi-Provider Support)
# =============================================================================
# Each provider has: SM REST API URL + AMQP broker config + optional mTLS certs
# Subscriptions reference providers by providerId
swim.providers=${SWIM_PROVIDERS:[{"providerId":"default","subscriptionManager":{"url":"http://localhost:8085","tls":null,"resilience":{"connectTimeoutMs":0,"readTimeoutMs":0,"retryMaxAttempts":0,"retryDelayMs":0}},"amqpBroker":{"host":"localhost","port":5676,"sslEnabled":false,"username":"admin","password":"admin","tls":null}}]}

# =============================================================================
# ED-254 Subscriptions
# =============================================================================
ed254.subscriptions=[]

# =============================================================================
# Reconciliation
# =============================================================================
reconciliation.retry.interval=${RECONCILIATION_RETRY_INTERVAL:10s}
reconciliation.retry.initial-delay=${RECONCILIATION_RETRY_INITIAL_DELAY:30s}
swim.subscription.filter-cache.refresh-interval-cycles=${SWIM_FILTER_CACHE_REFRESH_CYCLES:0}

# =============================================================================
# Subscription Renewal
# =============================================================================
swim.subscription.renewal.enabled=${SWIM_RENEWAL_ENABLED:true}
swim.subscription.renewal.check-interval=${SWIM_RENEWAL_CHECK_INTERVAL:5m}
swim.subscription.renewal.threshold=${SWIM_RENEWAL_THRESHOLD:1h}
swim.subscription.renewal.retry-count=${SWIM_RENEWAL_RETRY_COUNT:3}

# =============================================================================
# Validation
# =============================================================================
swim.validation.enabled=${SWIM_VALIDATION_ENABLED:true}
ed254.validation.message-validity-threshold-ms=${ED254_MESSAGE_VALIDITY_THRESHOLD_MS:30000}

# =============================================================================
# Kafka Configuration (global producer tuning)
# =============================================================================
kafka.batch.size=${KAFKA_BATCH_SIZE:65536}
kafka.linger.ms=${KAFKA_LINGER_MS:5}
kafka.buffer.memory=${KAFKA_BUFFER_MEMORY:67108864}

# =============================================================================
# Kafka Inbox Store (swim-inbox-store-kafka extension)
# Overrides the default topic from META-INF/microprofile-config.properties
# =============================================================================
mp.messaging.outgoing.swim-inbox.topic=${ED254_INBOX_TOPIC:ed254-inbox-topic}

# =============================================================================
# Kafka Inbox Consumer (Kafka -> full processing pipeline)
# =============================================================================
mp.messaging.incoming.in-ed254-inbox.connector=smallrye-kafka
mp.messaging.incoming.in-ed254-inbox.topic=${ED254_INBOX_TOPIC:ed254-inbox-topic}
mp.messaging.incoming.in-ed254-inbox.group.id=${ED254_INBOX_GROUP:ed254-inbox-consumer}
mp.messaging.incoming.in-ed254-inbox.batch=true
mp.messaging.incoming.in-ed254-inbox.auto.offset.reset=earliest
mp.messaging.incoming.in-ed254-inbox.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.in-ed254-inbox.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.in-ed254-inbox.failure-strategy=ignore
mp.messaging.incoming.in-ed254-inbox.commit-strategy=throttled
mp.messaging.incoming.in-ed254-inbox.auto.commit.interval.ms=${KAFKA_INBOX_COMMIT_INTERVAL:2000}
mp.messaging.incoming.in-ed254-inbox.max.poll.records=${KAFKA_INBOX_MAX_POLL:500}
mp.messaging.incoming.in-ed254-inbox.fetch.min.bytes=${KAFKA_INBOX_FETCH_MIN:1}
mp.messaging.incoming.in-ed254-inbox.fetch.max.wait.ms=${KAFKA_INBOX_FETCH_MAX_WAIT:100}
mp.messaging.incoming.in-ed254-inbox.concurrency=${KAFKA_INBOX_CONCURRENCY:20}
mp.messaging.incoming.in-ed254-inbox.tracing-enabled=true

# =============================================================================
# Kafka Outgoing Channels (Event Publishing)
# =============================================================================
mp.messaging.outgoing.out-arrival-sequence.connector=smallrye-kafka
mp.messaging.outgoing.out-arrival-sequence.topic=ed254-arrival-sequence-topic
mp.messaging.outgoing.out-arrival-sequence.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.out-arrival-sequence.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.out-arrival-sequence.compression.type=lz4
mp.messaging.outgoing.out-arrival-sequence.acks=1
mp.messaging.outgoing.out-arrival-sequence.max-inflight-messages=${KAFKA_MAX_INFLIGHT:0}
mp.messaging.outgoing.out-arrival-sequence.buffer-size=${KAFKA_BUFFER_SIZE:2048}
mp.messaging.outgoing.out-arrival-sequence.waitForWriteCompletion=false
mp.messaging.outgoing.out-arrival-sequence.tracing-enabled=true

mp.messaging.outgoing.out-provider-exception.connector=smallrye-kafka
mp.messaging.outgoing.out-provider-exception.topic=ed254-provider-exception-topic
mp.messaging.outgoing.out-provider-exception.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.out-provider-exception.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.out-provider-exception.compression.type=lz4
mp.messaging.outgoing.out-provider-exception.acks=1
mp.messaging.outgoing.out-provider-exception.max-inflight-messages=${KAFKA_MAX_INFLIGHT:0}
mp.messaging.outgoing.out-provider-exception.buffer-size=${KAFKA_BUFFER_SIZE:2048}
mp.messaging.outgoing.out-provider-exception.waitForWriteCompletion=false
mp.messaging.outgoing.out-provider-exception.tracing-enabled=true

mp.messaging.outgoing.out-ed254-dlq.connector=smallrye-kafka
mp.messaging.outgoing.out-ed254-dlq.topic=ed254-dlq-topic
mp.messaging.outgoing.out-ed254-dlq.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.out-ed254-dlq.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.out-ed254-dlq.compression.type=lz4
mp.messaging.outgoing.out-ed254-dlq.acks=1
mp.messaging.outgoing.out-ed254-dlq.max-inflight-messages=${KAFKA_MAX_INFLIGHT:0}
mp.messaging.outgoing.out-ed254-dlq.buffer-size=${KAFKA_BUFFER_SIZE:2048}
mp.messaging.outgoing.out-ed254-dlq.waitForWriteCompletion=false
mp.messaging.outgoing.out-ed254-dlq.tracing-enabled=true

# =============================================================================
# Per-Subscription Heartbeat Monitor
# =============================================================================
swim.heartbeat.monitor.enabled=true
swim.heartbeat.monitor.check-interval=15s
swim.heartbeat.monitor.tolerance=30s

# =============================================================================
# SSL/TLS
# =============================================================================
quarkus.ssl.native=true

# =============================================================================
# REST Client - Subscription Manager (per-provider, configured via swim.providers)
# =============================================================================
quarkus.rest-client.logging.scope=none
quarkus.rest-client.logging.body-limit=0

# =============================================================================
# Fault Tolerance (Timeout + Retry)
# =============================================================================
swim.subscription.api.timeout=${SWIM_SUBSCRIPTION_API_TIMEOUT:30000}
swim.subscription.api.max-retries=${SWIM_SUBSCRIPTION_API_MAX_RETRIES:3}
swim.subscription.api.retry-delay=${SWIM_SUBSCRIPTION_API_RETRY_DELAY:1000}
swim.subscription.api.max-duration=${SWIM_SUBSCRIPTION_API_MAX_DURATION:120000}

# =============================================================================
# Schedulers
# =============================================================================
swim.scheduler.initial-delay=${SWIM_SCHEDULER_INITIAL_DELAY:30s}

# =============================================================================
# AMQP Batch (Kafka Inbox Staging)
# =============================================================================
swim.amqp.max-buffered-messages=${SWIM_AMQP_MAX_BUFFERED_MESSAGES:50}
swim.inbox.batch.size=${INBOX_BATCH_SIZE:50}
swim.inbox.batch.flush-interval-ms=${INBOX_BATCH_FLUSH_MS:50}

# =============================================================================
# Outbox Recovery & Cleanup
# =============================================================================
swim.outbox.recovery.interval=${SWIM_OUTBOX_RECOVERY_INTERVAL:30s}
swim.outbox.recovery.batch-size=${SWIM_OUTBOX_RECOVERY_BATCH_SIZE:500}
swim.outbox.cleanup.interval=${SWIM_OUTBOX_CLEANUP_INTERVAL:5m}
swim.outbox.cleanup.batch-size=${SWIM_OUTBOX_CLEANUP_BATCH_SIZE:500}
swim.outbox.max-retries=${SWIM_OUTBOX_MAX_RETRIES:5}
swim.outbox.persist-retry-count=false

# =============================================================================
# Idempotency Cache
# =============================================================================
swim.idempotency.cache-name=ed254-processed-messages
quarkus.cache.caffeine."ed254-processed-messages".maximum-size=${SWIM_IDEMPOTENCY_CACHE_SIZE:50000}
quarkus.cache.caffeine."ed254-processed-messages".expire-after-write=${SWIM_IDEMPOTENCY_CACHE_TTL:PT2H}
quarkus.cache.caffeine."ed254-processed-messages".metrics-enabled=true

# =============================================================================
# OpenAPI / Swagger
# =============================================================================
quarkus.smallrye-openapi.path=/openapi
quarkus.smallrye-openapi.management.enabled=false
quarkus.swagger-ui.path=/swagger-ui
quarkus.swagger-ui.always-include=true
mp.openapi.extensions.smallrye.info.title=SWIM ED-254 Consumer API
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=SWIM ED-254 Arrival Sequence Consumer Service
mp.openapi.extensions.smallrye.info.contact.name=SWIM Developer Team

# =============================================================================
# Vert.x / Threading
# =============================================================================
quarkus.vertx.prefer-native-transport=true
quarkus.vertx.max-worker-execute-time=30s
quarkus.vertx.worker-pool-size=${VERTX_WORKER_POOL_SIZE:200}
quarkus.virtual-threads.enabled=false
quarkus.thread-pool.max-threads=${THREAD_POOL_MAX_THREADS:250}
quarkus.banner.enabled=true

# =============================================================================
# Logging
# =============================================================================
quarkus.log.level=INFO
quarkus.log.category."com.github.swim_developer".level=INFO
quarkus.log.category."io.quarkus".level=INFO
quarkus.log.category."org.apache.kafka".level=WARN
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5p [%c] (%t) %s%e%n
quarkus.log.console.async.enabled=true
quarkus.log.console.async.queue-length=10000
quarkus.log.console.async.overflow=DISCARD

# =============================================================================
# OpenTelemetry (Observability)
# =============================================================================
quarkus.otel.enabled=${OTEL_ENABLED:true}
quarkus.otel.sdk.disabled=${OTEL_SDK_DISABLED:false}
quarkus.otel.exporter.otlp.endpoint=${OTEL_ENDPOINT:http://localhost:4317}
quarkus.otel.exporter.otlp.headers=${OTEL_HEADERS:}
quarkus.otel.resource.attributes=service.name=swim-ed254-consumer,service.version=1.0.0,k8s.namespace.name=${POD_NAMESPACE:unknown}

# =============================================================================
# Prometheus Metrics
# =============================================================================
quarkus.management.enabled=true
quarkus.micrometer.enabled=${PROMETHEUS_ENABLED:true}
quarkus.micrometer.export.prometheus.enabled=${PROMETHEUS_ENABLED:true}
quarkus.micrometer.export.prometheus.path=/q/metrics

# =============================================================================
# Native Image Configuration
# =============================================================================
quarkus.index-dependency.fixm-ed254-model.group-id=com.github.swim-developer
quarkus.index-dependency.fixm-ed254-model.artifact-id=fixm-ed254-model
quarkus.native.resources.includes=schemas/**,com/sun/org/apache/xerces/internal/impl/msg/**,com/sun/org/apache/xerces/internal/impl/xpath/regex/**
quarkus.native.additional-build-args=-H:IncludeResourceBundles=com.sun.org.apache.xerces.internal.impl.msg.XMLSchemaMessages,-H:IncludeResourceBundles=com.sun.org.apache.xerces.internal.impl.msg.XMLMessages,-H:IncludeResourceBundles=com.sun.org.apache.xerces.internal.impl.msg.SAXMessages,-H:IncludeResourceBundles=com.sun.org.apache.xerces.internal.impl.xpath.regex.message
