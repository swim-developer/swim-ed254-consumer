# =============================================================================
# SWIM ED-254 Consumer - Production Profile
# =============================================================================
# Uses external MongoDB, Artemis, and Kafka in OpenShift
# All secrets are externalized via environment variables
# =============================================================================

# =============================================================================
# MongoDB
# =============================================================================
quarkus.mongodb.connection-string=${MONGODB_URI:mongodb://localhost:27017}

# =============================================================================
# SWIM Providers (Production - SSL enabled, from env var)
# =============================================================================
swim.providers=${SWIM_PROVIDERS}

# =============================================================================
# ED-254 Subscriptions (Environment variable)
# =============================================================================
ed254.subscriptions=${ED254_SUBSCRIPTIONS}

# =============================================================================
# Kafka
# =============================================================================
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# =============================================================================
# Leader Election (Deployment — Kubernetes Lease)
# =============================================================================
swim.leader-election.mode=lease
swim.leader-election.lease-name=swim-ed254-consumer-leader
swim.leader-election.lease-duration-seconds=15
swim.leader-election.renew-deadline-seconds=10
swim.leader-election.retry-period-seconds=2

# =============================================================================
# Logging (Production - Enhanced DEBUG for critical services)
# =============================================================================
quarkus.log.category."com.github.swim_developer".level=INFO
quarkus.log.category."com.github.swim_developer.service.messaging.AmqpConsumerManager".level=DEBUG
quarkus.log.category."com.github.swim_developer.service.event.EventProcessor".level=DEBUG
quarkus.log.category."com.github.swim_developer.service.event.EventProducer".level=DEBUG
quarkus.log.category."com.github.swim_developer.service.messaging.OutboxEventConsumer".level=DEBUG
quarkus.log.category."com.github.swim_developer.service.messaging.InboxEventConsumer".level=INFO
